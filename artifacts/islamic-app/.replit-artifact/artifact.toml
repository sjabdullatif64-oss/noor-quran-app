kind = "web"
previewPath = "/"
title = "Noor Quran"
version = "1.0.0"
id = "artifacts/islamic-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22446

[services.development]
run = "pnpm --filter @workspace/islamic-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/islamic-app", "run", "build" ]
run = "node artifacts/islamic-app/server.js"

[services.env]
PORT = "22446"
BASE_PATH = "/"
