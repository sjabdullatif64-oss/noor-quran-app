kind = "web"
previewPath = "/"
title = "Islamic App"
version = "1.0.0"
id = "artifacts/islamic-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22446

[services.development]
run = "pnpm --filter @workspace/islamic-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/islamic-app", "run", "build" ]
publicDir = "artifacts/islamic-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22446"
BASE_PATH = "/"
