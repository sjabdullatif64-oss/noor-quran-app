apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.sj64noorquran"
    compileSdk 36

    defaultConfig {
        applicationId "com.sj64noorquran"
        minSdk rootProject.ext.minSdkVersion
        targetSdk 36
        versionCode 2
        versionName "1.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
    }

    signingConfigs {
        debug {}

        release {
            def keystorePropertiesFile = rootProject.file("keystore.properties")
            if (keystorePropertiesFile.exists()) {
                def keystoreProperties = new Properties()
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                storeFile     file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
            } else {
                storeFile     file(System.getenv("KEYSTORE_PATH") ?: "noor-quran-release.keystore")
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                keyAlias      System.getenv("KEY_ALIAS")         ?: "noor-quran"
                keyPassword   System.getenv("KEY_PASSWORD")      ?: ""
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            minifyEnabled false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    bundle {
        language { enableSplit = false }
        density  { enableSplit = true  }
        abi      { enableSplit = true  }
    }

    lint {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // Capacitor core
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    // Capacitor plugins
    implementation project(':capacitor-local-notifications')
    implementation project(':capacitor-splash-screen')
    implementation project(':capacitor-status-bar')
    implementation project(':capacitor-app')
    implementation project(':capacitor-filesystem')
    implementation project(':capacitor-haptics')
    implementation project(':capacitor-network')
    implementation project(':capacitor-share')

    // AdMob — Capacitor community plugin (pulls in play-services-ads + UMP)
    implementation project(':capacitor-community-admob')

    // UMP (User Messaging Platform / consent) — synced with plugin default
    implementation 'com.google.android.ump:user-messaging-platform:4.0.0'

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'

    // MultiDex
    implementation 'androidx.multidex:multidex:2.0.1'

    // Kotlin stdlib
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}

// ── AD_ID permission: post-merge safety net ────────────────────────────────────
//
// LAYER 1: app/src/main/AndroidManifest.xml declares the permission with
//          tools:node="replace" so the app declaration beats any library AAR.
//
// LAYER 2 (this block): runs immediately AFTER the manifest-merge task writes
//          its output.  It locates the merged file by scanning the predictable
//          AGP 8.x intermediate directories — no task-property API is used, so
//          this is compatible with AGP 7.x through 8.x (manifestOutputDirectory
//          was removed in AGP 8 and must NOT be referenced).
//
// Verify after building:
//   grep "AD_ID" app/build/intermediates/merged_manifests/release/AndroidManifest.xml
//
afterEvaluate {
    tasks.matching { it.name ==~ /process.*ReleaseManifest.*/ }.configureEach { task ->
        task.doLast {
            // AGP 8.x writes merged manifests to one of these directories depending
            // on the exact AGP patch version and whether it's an APK or AAB build.
            // We probe all candidates and use whichever file exists.
            def candidates = [
                // AGP 8.9.x — processReleaseManifest output (APK + AAB base)
                "intermediates/merged_manifests/release/AndroidManifest.xml",
                // AGP 8.x variant with task-name sub-directory
                "intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml",
                // AGP 8.x — main-manifest intermediate (some sub-releases)
                "intermediates/merged_manifests/release/processReleaseMainManifest/AndroidManifest.xml",
                // AGP 8.x — bundle-specific manifest path
                "intermediates/bundle_manifest/release/AndroidManifest.xml",
                "intermediates/bundle_manifest/release/processReleaseManifest/AndroidManifest.xml",
            ].collect { new File(buildDir, it) }

            def manifest = candidates.find { it.exists() }

            if (manifest == null) {
                println "⚠️  [AD_ID check] Could not locate merged manifest — skipping injection."
                println "    Searched:"
                candidates.each { println "      ${it.absolutePath}" }
                return
            }

            println "ℹ️  [AD_ID check] Inspecting: ${manifest.absolutePath}"
            def content = manifest.text
            def adId    = 'com.google.android.gms.permission.AD_ID'

            if (content.contains(adId)) {
                println "✅ [AD_ID check] Permission present — no injection needed."
            } else {
                println "⚠️  [AD_ID check] Permission MISSING — force-injecting."
                def injection = '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n'
                manifest.text = content.replaceFirst('(?s)(<uses-permission)', injection + '$1')
                println "✅ [AD_ID check] Injected. Verify:"
                println "    grep AD_ID ${manifest.absolutePath}"
            }
        }
    }
}
