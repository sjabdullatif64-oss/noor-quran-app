apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.sj64noorquran"
    compileSdk 36

    defaultConfig {
        applicationId "com.sj64noorquran"
        minSdk rootProject.ext.minSdkVersion
        targetSdk 36
        versionCode 2
        versionName "1.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
    }

    signingConfigs {
        debug {}

        release {
            def keystorePropertiesFile = rootProject.file("keystore.properties")
            if (keystorePropertiesFile.exists()) {
                def keystoreProperties = new Properties()
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
                storeFile     file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
            } else {
                storeFile     file(System.getenv("KEYSTORE_PATH") ?: "noor-quran-release.keystore")
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                keyAlias      System.getenv("KEY_ALIAS")         ?: "noor-quran"
                keyPassword   System.getenv("KEY_PASSWORD")      ?: ""
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            minifyEnabled false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    bundle {
        language { enableSplit = false }
        density  { enableSplit = true  }
        abi      { enableSplit = true  }
    }

    lint {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    // Capacitor core
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    // Capacitor plugins
    implementation project(':capacitor-local-notifications')
    implementation project(':capacitor-splash-screen')
    implementation project(':capacitor-status-bar')
    implementation project(':capacitor-app')
    implementation project(':capacitor-filesystem')
    implementation project(':capacitor-haptics')
    implementation project(':capacitor-network')

    // AdMob — Capacitor community plugin (pulls in play-services-ads + UMP)
    implementation project(':capacitor-community-admob')

    // UMP (User Messaging Platform / consent) — synced with plugin default
    implementation 'com.google.android.ump:user-messaging-platform:4.0.0'

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.coordinatorlayout:coordinatorlayout:1.2.0'

    // MultiDex
    implementation 'androidx.multidex:multidex:2.0.1'

    // Kotlin stdlib
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}

// ── AD_ID permission: post-merge safety net ────────────────────────────────────
//
// LAYER 1: app/src/main/AndroidManifest.xml declares the permission with
//          tools:node="replace" so the app's declaration beats any library AAR.
//
// LAYER 2 (this block): runs immediately AFTER AGP's processReleaseManifest task
//          writes the merged AndroidManifest.xml to disk.  It reads the merged
//          file, checks for the AD_ID permission, and force-injects it if absent.
//          This is the nuclear option — it is immune to AAR manifest suppression,
//          Gradle caching quirks, and SDK version changes.
//
// After the build completes, verify with:
//   grep "AD_ID" app/build/intermediates/merged_manifests/release/AndroidManifest.xml
//
afterEvaluate {
    tasks.matching { it.name ==~ /process.*ReleaseManifest/ }.configureEach { task ->
        task.doLast {
            // AGP 7+ exposes the merged manifest directory via this provider.
            def outDir   = task.manifestOutputDirectory.get().asFile
            def manifest = new File(outDir, 'AndroidManifest.xml')
            if (!manifest.exists()) {
                println "⚠️  [AD_ID check] Merged manifest not found at: ${manifest.absolutePath}"
                return
            }

            def content = manifest.text
            def adId    = 'com.google.android.gms.permission.AD_ID'

            if (content.contains(adId)) {
                println "✅ [AD_ID check] Permission present in merged release manifest — no action needed."
            } else {
                println "⚠️  [AD_ID check] Permission MISSING from merged manifest — force-injecting now."
                // Insert immediately before the first existing <uses-permission> tag so
                // it groups naturally with the other permissions.
                def injection = '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n'
                def patched   = content.replaceFirst('(?s)(<uses-permission)', injection + '$1')
                manifest.text = patched
                println "✅ [AD_ID check] Injection complete. Verify:"
                println "     grep AD_ID app/build/intermediates/merged_manifests/release/AndroidManifest.xml"
            }
        }
    }
}
